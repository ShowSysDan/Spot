{% extends "base.html" %}
{% block title %}{{ "Edit" if monitor else "New" }} Monitor — Spot{% endblock %}
{% block content %}
<h1>{{ "Edit" if monitor else "New" }} Monitor</h1>
<form method="post" class="form">
  <label>Name
    <input type="text" name="name" required value="{{ monitor.name if monitor else '' }}">
  </label>
  <label>Description
    <textarea name="description" rows="2">{{ monitor.description if monitor and monitor.description else '' }}</textarea>
  </label>
  <label>Unit
    <input list="units" type="text" name="unit" required
           value="{{ monitor.unit if monitor else 'value' }}"
           placeholder="dB, °F, °C, %, lux, …">
    <datalist id="units">
      <option value="dB"><option value="dBA"><option value="dBC">
      <option value="°F"><option value="°C">
      <option value="%"><option value="lux"><option value="ppm">
      <option value="hPa"><option value="m/s"><option value="V"><option value="A">
    </datalist>
  </label>
  <label>Listener type
    <select name="listener_type">
      {% for t in listener_types %}
      <option value="{{ t }}" {% if monitor and monitor.listener_type == t %}selected{% endif %}>{{ t|upper }}</option>
      {% endfor %}
    </select>
    <small class="muted">
      HTTP uses the shared web port. TCP/UDP get a dedicated port automatically
      assigned from the 6101–6199 range on save.
    </small>
  </label>
  {% if monitor and monitor.port %}
  <label>Port
    <input type="text" value="{{ monitor.port }}" readonly class="readonly-input">
    <small class="muted">Auto-assigned. To change, switch listener type to HTTP and back, or delete and re-create.</small>
  </label>
  {% endif %}
  <label>Value extraction regex
    <input type="text" name="value_regex"
           value="{{ monitor.value_regex if monitor and monitor.value_regex else '' }}"
           placeholder="optional — e.g. (?P&lt;value&gt;-?\d+(?:\.\d+)?)">
    <small class="muted">
      Applied to each incoming line/payload. The first capture group named
      <code>value</code> (or the first group, or the whole match) becomes the
      numeric value; an optional named group <code>label</code> becomes the annotation.
      Leave blank to use the default parser
      (<code>92.3</code>, <code>92.3,Show Start</code>, <code>{"value":92.3}</code>, etc.).
      <br>Examples:
      <code>(\d+(?:\.\d+)?)\s*dB</code> &nbsp;·&nbsp;
      <code>(?P&lt;value&gt;-?\d+(?:\.\d+)?)</code> &nbsp;·&nbsp;
      <code>—\s*(?P&lt;value&gt;-?\d+(?:\.\d+)?)</code>
    </small>
  </label>
  <label>Retention (days)
    <input type="number" name="retention_days" min="1"
           value="{{ monitor.retention_days if monitor and monitor.retention_days else '' }}"
           placeholder="{% if default_retention %}blank = use default ({{ default_retention }}d){% else %}blank = keep forever{% endif %}">
    <small class="muted">
      Readings older than this many days are deleted by the janitor (runs hourly).
      {% if default_retention %}Global default if blank: <strong>{{ default_retention }} days</strong>.{% endif %}
    </small>
  </label>
  <label class="checkbox">
    <input type="checkbox" name="enabled" {% if (not monitor) or monitor.enabled %}checked{% endif %}>
    Enabled
  </label>
  <div class="row">
    <button type="submit" class="primary">Save</button>
    <a href="{{ url_for('web.index') }}" class="button">Cancel</a>
  </div>
</form>
{% endblock %}
