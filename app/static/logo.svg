<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Spot — dalmatian">
  <!-- Tail (behind body, curling right) -->
  <path fill="#e6e8eb" d="M44 38 Q53 34 56 39 Q56 45 50 46 Q46 46 43 44 Z"/>

  <!-- Body (sitting, egg-shaped) -->
  <ellipse cx="32" cy="40" rx="14" ry="16" fill="#e6e8eb"/>

  <!-- Front legs -->
  <path fill="#e6e8eb" d="M24 50 Q23 56 23 59 Q23 60 25 60 L30 60 Q31 60 31 59 Q31 56 30 50 Z"/>
  <path fill="#e6e8eb" d="M34 50 Q33 56 33 59 Q33 60 34 60 L39 60 Q41 60 41 59 Q41 56 40 50 Z"/>

  <!-- Head -->
  <ellipse cx="32" cy="17" rx="9" ry="8" fill="#e6e8eb"/>

  <!-- Droopy ears -->
  <path fill="#e6e8eb" d="M22 14 L14 22 L17 31 L26 21 Z"/>
  <path fill="#e6e8eb" d="M42 14 L50 22 L47 31 L38 21 Z"/>

  <!-- Eyes (dark on light head) -->
  <circle cx="29" cy="16" r="1.4" fill="#1a1a1a"/>
  <circle cx="35" cy="16" r="1.4" fill="#1a1a1a"/>

  <!-- Nose -->
  <ellipse cx="32" cy="21" rx="1.6" ry="1" fill="#1a1a1a"/>

  <!-- Spots (dark on light body, like a real dalmatian) -->
  <circle cx="25" cy="33" r="2.0" fill="#1a1a1a"/>
  <circle cx="37" cy="34" r="2.2" fill="#1a1a1a"/>
  <circle cx="22" cy="42" r="1.6" fill="#1a1a1a"/>
  <circle cx="33" cy="42" r="2.4" fill="#1a1a1a"/>
  <circle cx="40" cy="45" r="1.7" fill="#1a1a1a"/>
  <circle cx="28" cy="48" r="1.5" fill="#1a1a1a"/>
</svg>
